  let nF={};for(let g=1;g<=MG;g++){nF[g]=[];for(let k=0;k<10;k++)nF[g].push({});for(let i=g;i<L;i++){tails[i].forEach(fr=>{D[i-g].n.forEach(nm=>{nF[g][fr][nm]=(nF[g][fr][nm]||0)+1;});});}}

  let ttMx=Math.max(...trTail);let trTailN=trTail.map(s=>ttMx>0?s/ttMx*100:0);
  let neiHit={},neiTotal=0,neiHits=0;
  for(let i=1;i<L;i++){D[i].n.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39){neiTotal++;if(D[i-1].n.includes(nb)){neiHits++;neiHit[nb]=(neiHit[nb]||0)+1;}}});});}
  let neiRate=neiTotal>0?neiHits/neiTotal:0;
  let neiSc={};latest.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39){let w=Math.abs(dd)===1?1.5:1;neiSc[nb]=(neiSc[nb]||0)+w*(1+(neiHit[nb]||0)/(L*.05));}});});
  let neiTN=new Array(10).fill(0);latest.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39)neiTN[nb%10]+=(Math.abs(dd)===1?1.5:1);});});
  let ntMx=Math.max(...neiTN);let neiTNorm=neiTN.map(s=>ntMx>0?s/ntMx*100:0);
  let repN={},repT=0,repH=0;
  for(let i=1;i<L;i++){D[i].n.forEach(x=>{repT++;if(D[i-1].n.includes(x)){repH++;repN[x]=(repN[x]||0)+1;}});}
  let repRate=repT>0?repH/repT:0;
  let repSc={};latest.forEach(x=>{repSc[x]=(repN[x]||0)+1;});if(D.length>1)D[1].n.forEach(x=>{repSc[x]=(repSc[x]||0)+(repN[x]||0)*.3;});
  let repTN=new Array(10).fill(0);latest.forEach(x=>{repTN[x%10]+=20;});if(D.length>1)D[1].n.forEach(x=>{repTN[x%10]+=6;});
  let rtMx=Math.max(...repTN);let repTNorm=repTN.map(s=>rtMx>0?s/rtMx*100:0);
  let oeM={},bsM={};D.forEach(r=>{let od=r.n.filter(x=>x%2===1).length;let bg=r.n.filter(x=>x>=20).length;oeM[od+"單"+(5-od)+"雙"]=(oeM[od+"單"+(5-od)+"雙"]||0)+1;bsM[(5-bg)+"小"+bg+"大"]=(bsM[(5-bg)+"小"+bg+"大"]||0)+1;});
  let topOE=Object.entries(oeM).sort((a,b)=>b[1]-a[1]);let topBS=Object.entries(bsM).sort((a,b)=>b[1]-a[1]);
  let freqN=new Array(10).fill(0);for(let t=0;t<10;t++)freqN[t]=(tCnt[t]/(L*5)/.1)*30+(tR10[t]/50/.1)*40+(tStk[t]>=3?30:tStk[t]>=2?20:tStk[t]>=1?10:0);
  let fMx=Math.max(...freqN);let freqNorm=freqN.map(s=>fMx>0?s/fMx*100:0);
  let missN=tMiss.map(m=>m===0?100:m===1?80:m===2?60:m<=4?40:m<=7?20:5);
  let W={tr:.28,nei:.22,fq:.18,rp:.17,ms:.10,oe:.05};
  let tailFinal=new Array(10).fill(0);for(let t=0;t<10;t++)tailFinal[t]=trTailN[t]*W.tr+neiTNorm[t]*W.nei+freqNorm[t]*W.fq+repTNorm[t]*W.rp+missN[t]*W.ms+50*W.oe;
  let tailRk=tailFinal.map((s,i)=>({tail:i,score:s,cnt:tCnt[i],r10:tR10[i],stk:tStk[i],gap:tMiss[i]})).sort((a,b)=>b.score-a.score);
  let numFinal={};for(let n=1;n<=39;n++){let tS=(trNum[n]||0)*100*W.tr;let fS=((cnt[n]/(L*5)*39)*30+(r10[n]/10*39)*40+(stk[n]>=3?30:stk[n]>=2?20:stk[n]>=1?10:0))*W.fq;let nS=(neiSc[n]||0)*15*W.nei;let rS=(repSc[n]||0)*20*W.rp;let mS=(miss[n]===0?100:miss[n]===1?80:miss[n]===2?60:miss[n]<=4?40:miss[n]<=7?20:5)*W.ms;numFinal[n]={total:tS+fS+nS+rS+mS+50*W.oe};}
  let numRk=Object.keys(numFinal).map(k=>({num:+k,score:numFinal[+k].total})).sort((a,b)=>b.score-a.score);
  let tailNums=[];for(let t=0;t<10;t++){let a=[];for(let n=1;n<=39;n++)if(n%10===t)a.push(n);tailNums.push(a);}
  if(!tailNums[0].length)tailNums[0]=[10,20,30];
  return{D,L,latest,latT,tails,cnt,r10,stk,miss,tCnt,tStk,tMiss,tR10,tr,trT,nF,trNum,neiSc,neiRate,neiHit,repN,repRate,repSc,topOE,topBS,tailRk,numRk,tailNums,oeM};
}

function calcNumTrans(D, gap){
  /* 統計：號碼 fr 出現後，隔 gap 期，各號碼出現次數 */
  const cnt={}, total={};
  for(let i=gap;i<D.length;i++){
    D[i].n.forEach(fr=>{
      total[fr]=(total[fr]||0)+1;
      D[i-gap].n.forEach(to=>{
        const key=fr+'-'+to;
        cnt[key]=(cnt[key]||0)+1;
      });
    });
  }
  return{cnt,total};
}

function renderOe(el,A){
  let mO=A.topOE[0][1],mB=A.topBS[0][1];
  el.innerHTML=`<div class="section-hdr">奇偶（單雙）分布</div><div class="card"><div class="card-hd"><h3>🎲 奇偶比</h3></div><div class="card-bd">${A.topOE.map((e,i)=>`<div class="row"><span style="font-size:17px;font-weight:${i===0?800:600};color:${i===0?'var(--label)':'var(--label2)'};min-width:76px">${i===0?'▶ ':' '}${e[0]}</span>${br(e[1]/mO*100,i===0?'var(--purple)':'var(--bg3)',20)}<span style="font-size:16px;color:var(--label2);font-weight:700;min-width:80px;text-align:right">${e[1]} 次 (${(e[1]/allData.length*100).toFixed(0)}%)</span></div>`).join('')}</div></div><div class="section-hdr">大小比</div><div class="card"><div class="card-hd"><h3>📏 大小比例</h3><p>1–19 小號　20–39 大號</p></div><div class="card-bd">${A.topBS.map((e,i)=>`<div class="row"><span style="font-size:17px;font-weight:${i===0?800:600};color:${i===0?'var(--label)':'var(--label2)'};min-width:76px">${i===0?'▶ ':' '}${e[0]}</span>${br(e[1]/mB*100,i===0?'var(--teal)':'var(--bg3)',20)}<span style="font-size:16px;color:var(--label2);font-weight:700;min-width:80px;text-align:right">${e[1]} 次 (${(e[1]/allData.length*100).toFixed(0)}%)</span></div>`).join('')}</div></div>`;
}


function renderAd(el){
  let added=allData.filter(r=>!INIT_DATA.some(ir=>ir.d===r.d));
  let now=new Date();
  let defDate=now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0");
  el.innerHTML=`
  <div class="section-hdr">新增開獎號碼</div>
  <div class="card">
    <div class="card-hd"><h3>✏️ 輸入開獎號碼</h3><p>開獎時間：週一至週六　晚間 8:30</p></div>
    <div class="card-bd">
      <div style="margin-bottom:18px">
        <label class="field-label">日期</label>
        <input id="addDate" class="inp" style="width:200px" value="${defDate}" placeholder="YYYY/MM/DD">
      </div>
      <div style="margin-bottom:22px">
        <label class="field-label">號碼（01 ~ 39）</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${[0,1,2,3,4].map(i=>`<input id="addNum${i}" class="inp inp-num" placeholder="${i+1}" maxlength="2" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,2);if(this.value.length===2&&${i}<4)document.getElementById('addNum${i+1}').focus();">`).join('')}
        </div>
      </div>
      <button class="btn-primary btn-green" style="max-width:260px" onclick="doAdd()">✓ 確認新增</button>
      <div id="addMsg"></div>
    </div>
  </div>

  ${added.length?`<div class="section-hdr">已新增 ${added.length} 期</div><div class="card">${added.map(r=>`<div class="list-row"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:15px;color:var(--green);font-weight:700">${r.d}</span>${r.n.map(x=>bl(x,30)).join('')}</div><button class="btn-del" onclick="doDelete('${r.d}')">刪除</button></div>`).join('')}</div>`:''}

  <div style="text-align:center;padding:10px 0 20px">
    <button class="btn-reset" onclick="doReset()">↺ 恢復初始資料</button>
  </div>`;
}

function doAdd(){
  let date=document.getElementById('addDate').value;
  let nums=[];for(let i=0;i<5;i++){let v=parseInt(document.getElementById('addNum'+i).value);nums.push(v);}
  let parsed=nums.filter(x=>!isNaN(x)&&x>=1&&x<=39);
  let msgEl=document.getElementById('addMsg');
  if(parsed.length!==5){msgEl.innerHTML='<div class="msg err">❌ 請輸入 5 個 1～39 號碼</div>';return;}
  if(new Set(parsed).size!==5){msgEl.innerHTML='<div class="msg err">❌ 號碼不可重複</div>';return;}
  if(!date.match(/^\d{4}\/\d{2}\/\d{2}$/)){msgEl.innerHTML='<div class="msg err">❌ 日期格式：YYYY/MM/DD</div>';return;}
  if(allData.some(r=>r.d===date)){msgEl.innerHTML='<div class="msg err">❌ 該日期已有資料</div>';return;}
  let sorted=[...parsed].sort((a,b)=>a-b);
  allData=[{d:date,n:sorted},...allData];
  allData.sort((a,b)=>b.d.localeCompare(a.d));
  saveData();renderAll();
}
function doDelete(d){allData=allData.filter(r=>r.d!==d);saveData();renderAll();}
function doReset(){allData=[...INIT_DATA];try{localStorage.removeItem('l539v5');}catch(e){}renderAll();}

let saved=loadData();allData=saved||[...INIT_DATA];renderAll();
</script>
</body>
</html>
