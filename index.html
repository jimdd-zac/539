  let miss=new Array(40).fill(L);for(let n=1;n<=39;n++){for(let i=0;i<L;i++){if(D[i].n.includes(n)){miss[n]=i;break;}}}

  let tR10=new Array(10).fill(0);D.slice(0,10).forEach(r=>r.n.forEach(x=>tR10[x%10]++));
  let tStk=new Array(10).fill(0);for(let t=0;t<10;t++){for(let i=0;i<L;i++){if(D[i].n.some(x=>x%10===t))tStk[t]++;else break;}}
  let tMiss=new Array(10).fill(L);for(let t=0;t<10;t++){for(let i=0;i<L;i++){if(D[i].n.some(x=>x%10===t)){tMiss[t]=i;break;}}}

  let MG=5,tr={},trT={};
  for(let g=1;g<=MG;g++){tr[g]=[];for(let k=0;k<10;k++)tr[g].push(new Array(10).fill(0));trT[g]=new Array(10).fill(0);}
  for(let i=0;i<L;i++){for(let g=1;g<=MG;g++){if(i-g>=0){tails[i].forEach(fr=>{tails[i-g].forEach(to=>{tr[g][fr][to]++;});trT[g][fr]++;})}}}
  let nF={};
  for(let g=1;g<=MG;g++){nF[g]=[];for(let k=0;k<10;k++)nF[g].push({});for(let i=g;i<L;i++){tails[i].forEach(fr=>{D[i-g].n.forEach(nm=>{nF[g][fr][nm]=(nF[g][fr][nm]||0)+1;});});}}
  let gw={1:.4,2:.28,3:.17,4:.09,5:.06};
  let trNum={};
  for(let g=1;g<=MG;g++){latT.forEach(fr=>{let tot=trT[g][fr]||1;Object.keys(nF[g][fr]).forEach(nm=>{trNum[+nm]=(trNum[+nm]||0)+(nF[g][fr][nm]/tot)*gw[g];});});}
  let trTail=new Array(10).fill(0);
  for(let g=1;g<=MG;g++){latT.forEach(fr=>{let tot=trT[g][fr]||1;for(let to=0;to<10;to++)trTail[to]+=(tr[g][fr][to]/tot)*gw[g];});}

  let neiHit={},neiTotal=0,neiHits=0;
  for(let i=1;i<L;i++){D[i].n.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39){neiTotal++;if(D[i-1].n.includes(nb)){neiHits++;neiHit[nb]=(neiHit[nb]||0)+1;}}});});}
  let neiRate=neiTotal>0?neiHits/neiTotal:0;
  let neiSc={};latest.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39){let w=Math.abs(dd)===1?1.5:1;neiSc[nb]=(neiSc[nb]||0)+w*(1+(neiHit[nb]||0)/(L*.05));}});});
  let neiTN=new Array(10).fill(0);latest.forEach(x=>{[-2,-1,1,2].forEach(dd=>{let nb=x+dd;if(nb>=1&&nb<=39)neiTN[nb%10]+=(Math.abs(dd)===1?1.5:1);});});
  let ntMx=Math.max(...neiTN);let neiTNorm=neiTN.map(s=>ntMx>0?s/ntMx*100:0);

  let repN={},repT=0,repH=0;
  for(let i=1;i<L;i++){D[i].n.forEach(x=>{repT++;if(D[i-1].n.includes(x)){repH++;repN[x]=(repN[x]||0)+1;}});}
  let repRate=repT>0?repH/repT:0;
  let repSc={};latest.forEach(x=>{repSc[x]=(repN[x]||0)+1;});if(D.length>1)D[1].n.forEach(x=>{repSc[x]=(repSc[x]||0)+(repN[x]||0)*.3;});
  let repTN=new Array(10).fill(0);latest.forEach(x=>{repTN[x%10]+=20;});if(D.length>1)D[1].n.forEach(x=>{repTN[x%10]+=6;});
  let rtMx=Math.max(...repTN);let repTNorm=repTN.map(s=>rtMx>0?s/rtMx*100:0);

  D.forEach(r=>{let od=r.n.filter(x=>x%2===1).length;let bg=r.n.filter(x=>x>=20).length;

  let topOE=Object.entries(oeM).sort((a,b)=>b[1]-a[1]);
  let topBS=Object.entries(bsM).sort((a,b)=>b[1]-a[1]);

    let nS=(neiSc[n]||0)*15*W.nei;let rS=(repSc[n]||0)*20*W.rp;
    let mS=(miss[n]===0?100:miss[n]===1?80:miss[n]===2?60:miss[n]<=4?40:miss[n]<=7?20:5)*W.ms;
    numFinal[n]={total:tS+fS+nS+rS+mS+50*W.oe,tS,fS,nS,rS,mS};}
  let numRk=Object.keys(numFinal).map(k=>({num:+k,score:numFinal[+k].total})).sort((a,b)=>b.score-a.score);

  let tailNums=[];for(let t=0;t<10;t++){let a=[];for(let n=1;n<=39;n++)if(n%10===t)a.push(n);tailNums.push(a);}
  if(!tailNums[0].length)tailNums[0]=[10,20,30];

  return {D,L,latest,latT,tails,cnt,r10,stk,miss,tCnt,tStk,tMiss,tR10,tr,trT,nF,trNum,neiSc,neiRate,neiHit,repN,repRate,repSc,topOE,topBS,tailRk,numRk,numFinal,tailNums,oeM};
}

function switchTab(k){
  curTab=k;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+k).classList.add('active');
  document.querySelectorAll('.tabs button').forEach(btn=>{btn.classList.toggle('on',btn.dataset.tab===k);});
  renderTab(k);
}

function renderAll(){
  let A=analyze();

  document.getElementById('tabBar').innerHTML=tabs.map(t=>`<button data-tab="${t.k}" class="${curTab===t.k?'on':''}" style="${curTab===t.k?'background:'+t.c+'30':''}" onclick="switchTab('${t.k}')">${t.l}</button>`).join('');

  renderTab(curTab);

function renderTab(k){
  let A=analyze();
  let el=document.getElementById('tab-'+k);
  if(k==='recommend') renderRecommend(el,A);
  else if(k==='trans') renderTrans(el,A);
  else if(k==='nei') renderNei(el,A);
  else if(k==='freq') renderFreq(el,A);
  else if(k==='rep') renderRep(el,A);
  else if(k==='miss') renderMiss(el,A);
  else if(k==='oe') renderOE(el,A);
  else if(k==='add') renderAdd(el,A);
}

/* ═══ ACTIONS ═══ */
function doAdd(){
  let date=document.getElementById('addDate').value;
  let nums=[];for(let i=0;i<5;i++){let v=parseInt(document.getElementById('addNum'+i).value);nums.push(v);}
  let parsed=nums.filter(x=>!isNaN(x)&&x>=1&&x<=39);
  let msgEl=document.getElementById('addMsg');
  if(parsed.length!==5){msgEl.innerHTML='<div class="msg err">❌ 請輸入5個 1~39 號碼</div>';return;}
  if(new Set(parsed).size!==5){msgEl.innerHTML='<div class="msg err">❌ 號碼不可重複</div>';return;}
  if(!date.match(/^\d{4}\/\d{2}\/\d{2}$/)){msgEl.innerHTML='<div class="msg err">❌ 日期格式 YYYY/MM/DD</div>';return;}
  if(allData.some(r=>r.d===date)){msgEl.innerHTML='<div class="msg err">❌ 該日期已有資料</div>';return;}
  let sorted=[...parsed].sort((a,b)=>a-b);
  allData=[{d:date,n:sorted},...allData];
  saveData();renderAll();
  msgEl=document.getElementById('addMsg');
  if(msgEl)msgEl.innerHTML=`<div class="msg ok">✅ 已新增 ${date}：${sorted.join(', ')}</div>`;
}
function doDelete(d){allData=allData.filter(r=>r.d!==d);saveData();renderAll();}
function doReset(){allData=[...INIT_DATA];try{localStorage.removeItem('lotto539-html-v1');}catch(e){}renderAll();}

/* ═══ INIT ═══ */
let saved=loadData();
allData=saved||[...INIT_DATA];
renderAll();
</script>
